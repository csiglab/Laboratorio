<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bremontix · Laboratorium</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg: 'var(--bg)',
            fg: 'var(--fg)',
            muted: 'var(--muted)',
            accent: 'var(--accent)',
            accentDark: 'var(--accent-dark)',
            card: 'var(--card)',
            border: 'var(--border)',
          },
          fontFamily: {
            display: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            body: ['Inter', 'system-ui', 'sans-serif'],
            mono: ['"JetBrains Mono"', 'monospace'],
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --bg: #FAFBFC;
      --fg: #1E293B;
      --muted: #64748B;
      --accent: #4A6FA5;
      --accent-dark: #3A5A8A;
      --accent-glow: rgba(74, 111, 165, 0.15);
      --card: #FFFFFF;
      --border: #E2E8F0;
      --border-hover: #CBD5E1;
      --input-bg: #FFFFFF;
      --dropdown-shadow: rgba(0, 0, 0, 0.12);
      --card-shadow: rgba(0, 0, 0, 0.06);
      --tag-bg: rgba(30, 41, 59, 0.06);
      --tag-selected-border: #1E293B;
    }

    .dark {
      --bg: #0D1926;
      --fg: #E8EDF3;
      --muted: #8BA3BC;
      --accent: #6B9BD1;
      --accent-dark: #4A7AB0;
      --accent-glow: rgba(107, 155, 209, 0.2);
      --card: #152238;
      --border: #243B55;
      --border-hover: #3A5470;
      --input-bg: #0F1D2D;
      --dropdown-shadow: rgba(0, 0, 0, 0.4);
      --card-shadow: rgba(0, 0, 0, 0.3);
      --tag-bg: rgba(107, 155, 209, 0.12);
      --tag-selected-border: #6B9BD1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      transition: background-color 200ms ease-out, color 200ms ease-out;
    }

    .main-content { flex: 1 0 auto; }
    .site-footer { flex-shrink: 0; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-entrance { opacity: 0; animation: fadeInUp 250ms ease-out forwards; }
    .delay-1 { animation-delay: 0ms; }
    .delay-2 { animation-delay: 80ms; }
    .delay-3 { animation-delay: 150ms; }
    .delay-4 { animation-delay: 250ms; }

    @media (prefers-reduced-motion: reduce) {
      .animate-entrance { animation: none; opacity: 1; }
    }

    /* Theme Toggle */
    .theme-toggle {
      position: fixed;
      top: 1.5rem;
      right: 1.5rem;
      width: 44px;
      height: 44px;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 150ms ease-out;
      z-index: 100;
      box-shadow: 0 2px 8px var(--card-shadow);
    }
    .theme-toggle:hover { border-color: var(--border-hover); color: var(--fg); transform: translateY(-1px); }
    .theme-toggle .icon-sun, .theme-toggle .icon-moon { position: absolute; transition: opacity 200ms ease-out, transform 200ms ease-out; }
    .theme-toggle .icon-moon { opacity: 1; transform: rotate(0deg) scale(1); }
    .theme-toggle .icon-sun { opacity: 0; transform: rotate(-90deg) scale(0.5); }
    .dark .theme-toggle .icon-moon { opacity: 0; transform: rotate(90deg) scale(0.5); }
    .dark .theme-toggle .icon-sun { opacity: 1; transform: rotate(0deg) scale(1); }

    /* Search Module */
    .search-module { position: relative; }
    .search-input { transition: border-color 150ms ease-out, box-shadow 150ms ease-out, background-color 200ms ease-out; background-color: var(--input-bg); }
    .search-input:hover { border-color: var(--border-hover); }
    .search-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }

    /* Tag Row */
    .tag-row-wrapper { position: relative; width: 100%; margin-top: 12px; }
    .tag-row { display: flex; align-items: center; gap: 6px; }
    
    .tag-scroll-btn {
      flex-shrink: 0; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      border: 1px solid var(--border); border-radius: 6px; background: var(--card); color: var(--muted);
      cursor: pointer; transition: all 120ms ease-out; opacity: 0; pointer-events: none;
    }
    .tag-scroll-btn.visible { opacity: 1; pointer-events: auto; }
    .tag-scroll-btn:hover { border-color: var(--border-hover); color: var(--fg); background: var(--tag-bg); }
    
    .tag-scroll-container { flex: 1; overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; scroll-behavior: smooth; }
    .tag-scroll-container::-webkit-scrollbar { display: none; }
    .tag-container { display: flex; flex-wrap: nowrap; gap: 8px; padding: 2px 0; }

    .tag-fade-left, .tag-fade-right {
      position: absolute; top: 0; bottom: 0; width: 32px; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 200ms ease-out;
    }
    .tag-fade-left { left: 40px; background: linear-gradient(to right, var(--bg) 0%, var(--bg) 40%, transparent 100%); }
    .tag-fade-right { right: 40px; background: linear-gradient(to left, var(--bg) 0%, var(--bg) 40%, transparent 100%); }
    .tag-fade-left.visible, .tag-fade-right.visible { opacity: 1; }

    .tag-pill {
      display: inline-flex; align-items: center; padding: 5px 12px; font-family: 'JetBrains Mono', monospace;
      font-size: 11px; font-weight: 400; letter-spacing: 0.04em; color: var(--muted);
      background: transparent; border: 1px solid var(--border); border-radius: 4px;
      white-space: nowrap; cursor: pointer; transition: all 100ms ease-out; flex-shrink: 0;
    }
    .tag-pill:hover:not(.selected) { color: var(--fg); border-color: var(--border-hover); background: var(--tag-bg); }
    .tag-pill.selected { color: var(--fg); background: var(--tag-bg); border-color: var(--tag-selected-border); font-weight: 500; }

    /* Dropdown Panel - PUSHES CONTENT DOWN (Relative Position) */
    .search-dropdown {
      position: relative; /* Back to relative to push content */
      margin-top: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 16px 48px -8px var(--dropdown-shadow), 0 4px 12px -4px var(--dropdown-shadow);
      
      /* Display none/block for document flow */
      display: none;
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 180ms ease-out, transform 180ms ease-out;
      overflow: hidden;
    }
    .search-dropdown.open { 
      display: block; 
      opacity: 1; 
      transform: translateY(0); 
    }

    /* Dropdown Header - Laboratory style */
    .dropdown-header {
      padding: 14px 18px;
      background: linear-gradient(180deg, var(--tag-bg) 0%, transparent 100%);
      border-bottom: 1px solid var(--border);
    }
    .dropdown-header-title {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .dropdown-header-title::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 1px;
      transform: rotate(45deg);
    }
    .dropdown-stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
    }
    .stat-item {
      display: flex;
      align-items: baseline;
      gap: 5px;
    }
    .stat-value {
      font-family: 'JetBrains Mono', monospace;
      font-size: 16px;
      font-weight: 500;
      color: var(--fg);
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
    }

    /* Results Section */
    .dropdown-results-label {
      padding: 10px 18px 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      background: var(--card);
      position: sticky;
      top: 0;
      z-index: 1;
    }
    .dropdown-results {
      max-height: 320px;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 0 10px 10px;
    }
    .dropdown-results::-webkit-scrollbar {
      width: 6px;
    }
    .dropdown-results::-webkit-scrollbar-track {
      background: transparent;
    }
    .dropdown-results::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .dropdown-results::-webkit-scrollbar-thumb:hover {
      background: var(--border-hover);
    }

    /* Dropdown Item - Matches card aesthetic */
    .search-dropdown-item {
      position: relative;
      padding: 12px 14px;
      margin-top: 6px;
      cursor: pointer;
      transition: all 120ms ease-out;
      border: 1px solid transparent;
      border-radius: 8px;
      background: var(--card);
    }
    .search-dropdown-item::before {
      content: '';
      position: absolute;
      left: 0;
      top: 4px;
      bottom: 4px;
      width: 2px;
      background: var(--accent);
      border-radius: 1px;
      opacity: 0;
      transition: opacity 120ms ease-out;
    }
    .search-dropdown-item:first-child { margin-top: 0; }
    .search-dropdown-item:hover,
    .search-dropdown-item.active {
      background: var(--tag-bg);
      border-color: var(--border);
      transform: translateX(2px);
    }
    .search-dropdown-item:hover::before,
    .search-dropdown-item.active::before {
      opacity: 1;
    }

    .dropdown-item-icon {
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--tag-bg);
      border-radius: 8px;
      color: var(--muted);
      font-size: 14px;
      transition: color 120ms ease-out, background-color 120ms ease-out;
    }
    .search-dropdown-item:hover .dropdown-item-icon {
      color: var(--accent);
    }
    .dropdown-item-content { flex: 1; min-width: 0; }
    .dropdown-item-name {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 17px;
      font-weight: 500;
      color: var(--fg);
      margin-bottom: 2px;
      transition: color 120ms ease-out;
    }
    .search-dropdown-item:hover .dropdown-item-name {
      color: var(--accent);
    }
    .dropdown-item-meta {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
    }
    .dropdown-item-category {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.04em;
      color: var(--muted);
    }
    .dropdown-item-tag {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      padding: 2px 6px;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
    }

    /* Empty State */
    .dropdown-empty {
      padding: 32px 18px;
      text-align: center;
    }
    .dropdown-empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--tag-bg);
      border-radius: 12px;
      color: var(--muted);
      font-size: 18px;
    }
    .dropdown-empty-text {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 16px;
      font-style: italic;
      color: var(--muted);
    }

    /* Card */
    .entity-card { transition: transform 150ms ease-out, box-shadow 150ms ease-out, background-color 200ms ease-out; background-color: var(--card); border-color: var(--border); }
    .entity-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 2px; background-color: var(--accent); opacity: 0; transition: opacity 150ms ease-out; }
    .entity-card:hover::before { opacity: 1; }
    .entity-card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px -8px var(--dropdown-shadow); }
    .entity-card:hover .card-title { color: var(--accent); }

    /* View CTA */
    .view-cta { transition: color 150ms ease-out; color: var(--accent); }
    .view-cta:hover { color: var(--accent-dark); }
    .view-cta:hover .view-arrow { transform: translateX(3px); }
    .view-arrow { transition: transform 150ms ease-out; }

    /* Footer */
    .footer-link { text-decoration: none; color: #8A9DB0; transition: color 150ms; }
    .footer-link:hover { color: #E8EDF3; }
    .logo-img { transition: opacity 150ms ease-out; }
    .dark .logo-img { filter: brightness(1.1); }
  </style>
</head>
<body>
  
  <!-- Theme Toggle -->
  <button class="theme-toggle animate-entrance" id="themeToggle" aria-label="Toggle dark mode" type="button">
    <svg class="icon-moon w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"/>
    </svg>
    <svg class="icon-sun w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
      <path d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0a3.75 3.75 0 017.5 0z"/>
    </svg>
  </button>

  <div class="main-content">

    <!-- Header -->
    <header class="pt-12 pb-10 px-6">
      <div class="max-w-6xl mx-auto text-center">
        
        <div class="animate-entrance delay-1 mb-6">
          <div class="inline-flex items-center justify-center w-20 h-20">
            <img src="logo.png" alt="Bremontix Coat of Arms" class="logo-img w-16 h-16 object-contain opacity-90" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
            <div class="hidden w-16 h-16 rounded-full border-2 border-border bg-card items-center justify-center">
              <i class="fas fa-flask text-fg opacity-60"></i>
            </div>
          </div>
        </div>

        <p class="animate-entrance delay-2 font-mono text-[10px] tracking-[0.2em] text-muted uppercase mb-3">EST. MMXXIV</p>
        <h1 class="animate-entrance delay-2 font-display text-3xl md:text-4xl font-medium tracking-tight text-fg mb-1">BREMONTIX</h1>
        <p class="animate-entrance delay-3 font-display text-lg md:text-xl italic text-muted">Laboratorium</p>
      </div>
    </header>

    <!-- Inquiry Layer -->
    <section class="pb-8 px-6">
      <div class="max-w-xl mx-auto animate-entrance delay-4">
        
        <div class="search-module" id="searchModule">
          <div class="relative">
            <input
              type="text" 
              id="searchInput"
              class="search-input w-full h-12 px-4 pr-10 text-sm bg-card border border-border rounded-lg shadow-sm"
              placeholder="Search entities..."
              autocomplete="off"
              aria-label="Search entities"
              aria-expanded="false"
              aria-controls="searchDropdown"
            >
            <svg class="absolute right-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted pointer-events-none" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/>
              <path d="m21 21-4.35-4.35"/>
            </svg>
          </div>

          <!-- Tag Row -->
          <div class="tag-row-wrapper" id="tagRowWrapper">
            <div class="tag-fade-left" id="tagFadeLeft"></div>
            <div class="tag-fade-right" id="tagFadeRight"></div>
            <div class="tag-row" role="tablist">
              <button class="tag-scroll-btn" id="tagScrollLeft" aria-label="Scroll tags left" type="button">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 19l-7-7 7-7"/></svg>
              </button>
              <div class="tag-scroll-container" id="tagScrollContainer">
                <div class="tag-container" id="tagContainer">
                  <button class="tag-pill selected" data-filter="all" role="tab" aria-selected="true">All</button>
                </div>
              </div>
              <button class="tag-scroll-btn" id="tagScrollRight" aria-label="Scroll tags right" type="button">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5l7 7-7 7"/></svg>
              </button>
            </div>
          </div>

          <!-- Dropdown (Now pushes content down) -->
          <div id="searchDropdown" class="search-dropdown" role="listbox">
            <div class="dropdown-header">
              <div class="dropdown-header-title">Summary</div>
              <div class="dropdown-stats-row" id="metadataStats"></div>
            </div>
            <div class="dropdown-results-label" id="resultsLabel">Matching Entities</div>
            <div class="dropdown-results" id="dropdownResults" role="listbox"></div>
          </div>
        </div>

      </div>
    </section>

    <!-- Grid -->
    <section class="pb-12 px-6">
      <div class="max-w-7xl mx-auto">
        <div id="entityGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5" role="list" aria-label="Entity registry">
          <div class="col-span-3 text-center py-20 text-muted">Loading registry data...</div>
        </div>
        <div id="emptyState" class="hidden py-20 text-center"><p class="text-muted">No matching entities found.</p></div>
      </div>
    </section>

    <!-- Pagination -->
    <section id="paginationSection" class="hidden pb-16 px-6">
      <div class="max-w-7xl mx-auto flex items-center justify-center gap-6">
        <button id="prevBtn" class="pagination-btn flex items-center gap-2 text-sm text-muted disabled:opacity-40" disabled>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          <span>Prev</span>
        </button>
        <div id="pageIndicator" class="flex items-center gap-2"></div>
        <button id="nextBtn" class="pagination-btn flex items-center gap-2 text-sm text-muted">
          <span>Next</span>
          <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
      </div>
    </section>

  </div>

  <!-- FOOTER -->
  <footer class="site-footer mt-8 py-8 px-6 border-t" style="background-color: #0B1A2B; border-color: rgba(90, 112, 137, 0.15);">
    <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-6">
      <div class="text-center sm:text-left">
        <p class="font-display text-sm tracking-wide" style="color: #E8EDF3;">
          BREMONTIX <span class="mx-2 opacity-50">|</span> <span class="italic" style="color: #B8C5D4;">Laboratorium</span>
        </p>
      </div>
      <nav class="flex items-center gap-6">
        <a href="#" class="footer-link text-xs">About</a>
        <a href="research/" class="footer-link text-xs">Research Index</a>
        <a href="https://github.com/csiglab/Laboratorio" target="_blank" class="footer-link text-xs">Github</a>
      </nav>
      <div class="text-center sm:text-right">
        <p class="font-display text-xs italic" style="color: #5A7089;">Ordo ex comparatione.</p>
      </div>
    </div>
  </footer>

  <script>
    // Theme Logic
    const themeToggle = document.getElementById('themeToggle');
    const htmlElement = document.documentElement;
    
    function setTheme(theme) {
      if (theme === 'dark') htmlElement.classList.add('dark');
      else htmlElement.classList.remove('dark');
      localStorage.setItem('bremontix-theme', theme);
    }
    
    if (localStorage.getItem('bremontix-theme')) setTheme(localStorage.getItem('bremontix-theme'));
    else setTheme(window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    
    themeToggle.addEventListener('click', () => setTheme(htmlElement.classList.contains('dark') ? 'light' : 'dark'));

    // State
    let entities = [];
    let currentFilter = 'all';
    let currentPage = 1;
    const itemsPerPage = 12;
    let filteredEntities = [];
    let dropdownOpen = false;
    let activeIndex = -1;
    let currentMatches = [];

    // DOM Elements
    const searchInput = document.getElementById('searchInput');
    const searchDropdown = document.getElementById('searchDropdown');
    const dropdownResults = document.getElementById('dropdownResults');
    const metadataStats = document.getElementById('metadataStats');
    const resultsLabel = document.getElementById('resultsLabel');
    const entityGrid = document.getElementById('entityGrid');
    const emptyState = document.getElementById('emptyState');
    const pageIndicator = document.getElementById('pageIndicator');
    const paginationSection = document.getElementById('paginationSection');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const tagContainer = document.getElementById('tagContainer');
    const tagScrollContainer = document.getElementById('tagScrollContainer');
    const tagScrollLeft = document.getElementById('tagScrollLeft');
    const tagScrollRight = document.getElementById('tagScrollRight');
    const tagFadeLeft = document.getElementById('tagFadeLeft');
    const tagFadeRight = document.getElementById('tagFadeRight');

    // Initialize
    fetch('data.json')
      .then(response => {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.json();
      })
      .then(data => {
        entities = data.entities || [];
        loadData();
      })
      .catch(error => {
        console.error('Error loading data.json:', error);
        entityGrid.innerHTML = '<div class="col-span-3 text-center py-20 text-muted">Error: Could not load data.json.</div>';
      });

    function loadData() {
      filteredEntities = [...entities];
      renderTags();
      updateTagScrollState();
      renderGrid();
    }

    // Tag Scroll Logic
    function updateTagScrollState() {
      const scrollEl = tagScrollContainer;
      const scrollWidth = scrollEl.scrollWidth;
      const clientWidth = scrollEl.clientWidth;
      const scrollLeft = scrollEl.scrollLeft;
      const hasOverflow = scrollWidth > clientWidth + 1;
      const canScrollLeft = scrollLeft > 2;
      const canScrollRight = scrollLeft < scrollWidth - clientWidth - 2;

      tagScrollLeft.classList.toggle('visible', hasOverflow && canScrollLeft);
      tagScrollRight.classList.toggle('visible', hasOverflow && canScrollRight);
      tagFadeLeft.classList.toggle('visible', canScrollLeft);
      tagFadeRight.classList.toggle('visible', canScrollRight);
    }

    function scrollTags(direction) {
      const scrollAmount = 150;
      const targetScroll = tagScrollContainer.scrollLeft + (direction === 'left' ? -scrollAmount : scrollAmount);
      tagScrollContainer.scrollTo({ left: targetScroll, behavior: 'smooth' });
    }

    tagScrollLeft.addEventListener('click', () => scrollTags('left'));
    tagScrollRight.addEventListener('click', () => scrollTags('right'));
    tagScrollContainer.addEventListener('scroll', updateTagScrollState, { passive: true });

    function getTagCounts() {
      const counts = {};
      entities.forEach(e => {
        if (Array.isArray(e.tags)) {
          e.tags.forEach(t => counts[t] = (counts[t] || 0) + 1);
        }
      });
      return counts;
    }

    function renderTags() {
      const tagCounts = getTagCounts();
      const tagNames = Object.keys(tagCounts);
      
      const allTag = tagContainer.querySelector('[data-filter="all"]');
      tagContainer.innerHTML = '';
      tagContainer.appendChild(allTag);
      
      tagNames.forEach(t => {
        const tag = document.createElement('button');
        tag.className = 'tag-pill';
        tag.setAttribute('data-filter', t);
        tag.setAttribute('role', 'tab');
        tag.setAttribute('aria-selected', 'false');
        tag.textContent = t;
        tagContainer.appendChild(tag);
      });
      
      attachTagListeners();
    }

    function attachTagListeners() {
      const tags = tagContainer.querySelectorAll('.tag-pill');
      tags.forEach(tag => {
        tag.addEventListener('click', () => {
          tags.forEach(t => { t.classList.remove('selected'); t.setAttribute('aria-selected', 'false'); });
          tag.classList.add('selected');
          tag.setAttribute('aria-selected', 'true');
          currentFilter = tag.dataset.filter;
          filterEntities();
        });
      });
    }

    function renderMetadata(matchCount) {
      const totalEntities = entities.length;
      const tagCounts = getTagCounts();
      const topTags = Object.entries(tagCounts).slice(0, 3);
      
      let statsHTML = `<div class="stat-item"><span class="stat-value">${totalEntities}</span><span class="stat-label">Total</span></div>`;
      topTags.forEach(([tag, count]) => {
        statsHTML += `<div class="stat-item"><span class="stat-value">${count}</span><span class="stat-label">${tag}</span></div>`;
      });
      
      metadataStats.innerHTML = statsHTML;
      resultsLabel.textContent = matchCount > 0 ? `${matchCount} Matching ${matchCount === 1 ? 'Entity' : 'Entities'}` : 'No Matches';
    }

    function openDropdown() { 
      dropdownOpen = true; 
      searchDropdown.classList.add('open'); 
      searchInput.setAttribute('aria-expanded', 'true'); 
    }
    
    function closeDropdown() { 
      dropdownOpen = false; 
      activeIndex = -1; 
      searchDropdown.classList.remove('open'); 
      searchInput.setAttribute('aria-expanded', 'false'); 
    }

    function renderDropdown(term) {
      if (term.length < 2) { closeDropdown(); return; }
      
      currentMatches = entities.filter(e => 
        e.name.toLowerCase().includes(term.toLowerCase()) || 
        e.tags.some(t => t.toLowerCase().includes(term.toLowerCase())) ||
        e.category.toLowerCase().includes(term.toLowerCase())
      );
      
      renderMetadata(currentMatches.length);
      
      if (currentMatches.length === 0) {
        dropdownResults.innerHTML = `
          <div class="dropdown-empty">
            <div class="dropdown-empty-icon">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                <circle cx="11" cy="11" r="8"/>
                <path d="m21 21-4.35-4.35"/>
              </svg>
            </div>
            <p class="dropdown-empty-text">No entities found for "${term}"</p>
          </div>
        `;
      } else {
        dropdownResults.innerHTML = currentMatches.map((e, i) => `
          <div class="search-dropdown-item" data-index="${i}" role="option">
            <div class="flex items-center gap-3">
              <div class="dropdown-item-icon">
                <i class="fas ${e.icon}"></i>
              </div>
              <div class="dropdown-item-content">
                <p class="dropdown-item-name">${e.name}</p>
                <div class="dropdown-item-meta">
                  <span class="dropdown-item-category">${e.category}</span>
                  <span class="dropdown-item-tag">${e.lab}</span>
                </div>
              </div>
            </div>
          </div>
        `).join('');
        
        dropdownResults.querySelectorAll('.search-dropdown-item').forEach((item, idx) => {
          item.addEventListener('click', () => selectItem(idx));
        });
      }
      openDropdown();
    }

    function selectItem(index) {
      if (index >= 0 && index < currentMatches.length) {
        searchInput.value = currentMatches[index].name;
        closeDropdown();
        filterEntities();
      }
    }

    function renderCard(entity) {
      return `
        <article class="entity-card relative border rounded-xl p-5 shadow-sm" role="listitem">
          <div class="flex items-start justify-between mb-3">
            <div class="flex items-center gap-2">
              <span class="text-base w-5 text-center"><i class="fas ${entity.icon}"></i></span>
            </div>
          </div>
          <h3 class="card-title font-display text-lg font-medium text-fg mb-1 transition-colors duration-150">${entity.name}</h3>
          <p class="text-sm text-muted leading-relaxed mb-3 line-clamp-2">${entity.description}</p>
          <div class="flex items-center justify-between pt-3 border-t border-border">
            <span class="font-mono text-[10px] text-muted">${entity.lab}</span>
            <a href="${entity.link}" target="_blank" class="view-cta inline-flex items-center gap-1 text-xs font-medium">
              <span>View</span>
              <svg class="w-3 h-3 view-arrow" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </a>
          </div>
        </article>
      `;
    }

    function renderGrid() {
      const pageEntities = filteredEntities.slice((currentPage - 1) * itemsPerPage, currentPage * itemsPerPage);
      if (filteredEntities.length === 0) {
        entityGrid.classList.add('hidden'); emptyState.classList.remove('hidden'); paginationSection.classList.add('hidden');
      } else {
        emptyState.classList.add('hidden'); entityGrid.classList.remove('hidden');
        entityGrid.innerHTML = pageEntities.map(renderCard).join('');
        if (filteredEntities.length > itemsPerPage) { paginationSection.classList.remove('hidden'); renderPagination(); }
        else paginationSection.classList.add('hidden');
      }
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredEntities.length / itemsPerPage);
      pageIndicator.innerHTML = Array.from({length: totalPages}, (_, i) => i+1).map(p => 
        `<button class="page-dot ${p === currentPage ? 'w-6 h-2' : 'w-2 h-2 bg-border hover:bg-muted'} rounded-full transition-all" style="${p === currentPage ? 'background-color: var(--accent);' : ''}" data-page="${p}"></button>`
      ).join('');
      
      prevBtn.disabled = currentPage === 1;
      nextBtn.disabled = currentPage === totalPages;
      
      pageIndicator.querySelectorAll('.page-dot').forEach(d => d.addEventListener('click', () => { currentPage = parseInt(d.dataset.page); renderGrid(); }));
    }

    function filterEntities() {
      const term = searchInput.value.toLowerCase().trim();
      filteredEntities = entities.filter(e => {
        const matchFilter = currentFilter === 'all' || e.tags.includes(currentFilter);
        const matchSearch = !term || e.name.toLowerCase().includes(term) || e.description.toLowerCase().includes(term) || e.lab.toLowerCase().includes(term);
        return matchFilter && matchSearch;
      });
      currentPage = 1;
      renderGrid();
    }

    // Listeners
    searchInput.addEventListener('input', (e) => { renderDropdown(e.target.value); filterEntities(); });
    searchInput.addEventListener('focus', () => { if(searchInput.value.length >= 2) renderDropdown(searchInput.value); });
    searchInput.addEventListener('keydown', (e) => {
      if (!dropdownOpen) return;
      const items = dropdownResults.querySelectorAll('.search-dropdown-item');
      if (e.key === 'ArrowDown') { e.preventDefault(); activeIndex = Math.min(activeIndex + 1, items.length - 1); items.forEach((it, i) => it.classList.toggle('active', i === activeIndex)); }
      else if (e.key === 'ArrowUp') { e.preventDefault(); activeIndex = Math.max(activeIndex - 1, 0); items.forEach((it, i) => it.classList.toggle('active', i === activeIndex)); }
      else if (e.key === 'Enter') { e.preventDefault(); selectItem(activeIndex); }
      else if (e.key === 'Escape') closeDropdown();
    });
    document.addEventListener('click', (e) => { if (!document.getElementById('searchModule').contains(e.target)) closeDropdown(); });
    prevBtn.addEventListener('click', () => { if (currentPage > 1) { currentPage--; renderGrid(); }});
    nextBtn.addEventListener('click', () => { if (currentPage < Math.ceil(filteredEntities.length / itemsPerPage)) { currentPage++; renderGrid(); }});
    window.addEventListener('resize', updateTagScrollState);
  </script>
</body>
</html>
